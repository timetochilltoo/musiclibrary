name: MusicLibraryPad
options:
  bundleIdPrefix: com.timetochilltoo
targets:
  MusicReadOnlyClient:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Sources/MusicReadOnlyClient
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
  MusicLibraryPadShell:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Sources/MusicLibraryPadShell
    dependencies:
      - target: MusicReadOnlyClient
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
  MusicLibraryPad:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Sources/MusicLibraryPad
    dependencies:
      - target: MusicLibraryPadShell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.timetochilltoo.MusicLibraryPad
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
schemes:
  MusicLibraryPad:
    build:
      targets:
        MusicLibraryPad: all
    run:
      config: Debug
